<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="560" viewBox="0 0 1120 560" role="img" aria-labelledby="title desc">
  <title id="title">NeXus product map</title>
  <desc id="desc">Product subdivisions for NeXus Core, Boot, Drivers, Services, Runtime and SDK.</desc>
  <defs>
    <style>
      .bg { fill: #111827; }
      .center { fill: #12343b; stroke: #2dd4bf; stroke-width: 2; }
      .node { fill: #1f2937; stroke: #64748b; stroke-width: 2; rx: 10; }
      .future { fill: #2a2139; stroke: #a78bfa; stroke-width: 2; rx: 10; }
      .text { font: 17px monospace; fill: #f8fafc; font-weight: 700; }
      .small { font: 13px monospace; fill: #cbd5e1; }
      .title { font: 28px monospace; font-weight: 700; fill: #f8fafc; }
      .line { stroke: #475569; stroke-width: 2; }
    </style>
  </defs>
  <rect class="bg" width="1120" height="560"/>
  <text x="40" y="52" class="title">NeXus product subdivisions</text>

  <circle cx="560" cy="280" r="95" class="center"/>
  <text x="505" y="270" class="text">NeXus Core</text>
  <text x="486" y="300" class="small">microkernel x86-64</text>

  <line x1="485" y1="220" x2="250" y2="145" class="line"/>
  <line x1="560" y1="185" x2="560" y2="120" class="line"/>
  <line x1="635" y1="220" x2="870" y2="145" class="line"/>
  <line x1="475" y1="330" x2="245" y2="410" class="line"/>
  <line x1="560" y1="375" x2="560" y2="440" class="line"/>
  <line x1="645" y1="330" x2="875" y2="410" class="line"/>

  <rect x="80" y="95" width="260" height="100" class="node"/>
  <text x="120" y="132" class="text">NeXus Boot</text>
  <text x="120" y="162" class="small">BIOS now, UEFI later</text>

  <rect x="430" y="70" width="260" height="100" class="node"/>
  <text x="470" y="107" class="text">NeXus Drivers</text>
  <text x="470" y="137" class="small">serial, VGA, PIT, disk</text>

  <rect x="780" y="95" width="260" height="100" class="future"/>
  <text x="820" y="132" class="text">NeXus Runtime</text>
  <text x="820" y="162" class="small">syscalls, IPC ABI, ELF</text>

  <rect x="80" y="365" width="260" height="100" class="future"/>
  <text x="120" y="402" class="text">NeXus Services</text>
  <text x="120" y="432" class="small">FS, driver manager, init</text>

  <rect x="430" y="440" width="260" height="100" class="future"/>
  <text x="470" y="477" class="text">NeXus SDK</text>
  <text x="470" y="507" class="small">tools, docs, examples</text>

  <rect x="780" y="365" width="260" height="100" class="future"/>
  <text x="820" y="402" class="text">NeXus C/Rust</text>
  <text x="820" y="432" class="small">future userspace path</text>
</svg>
