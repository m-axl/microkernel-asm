<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="680" viewBox="0 0 1120 680" role="img" aria-labelledby="title desc">
  <title id="title">NeXus architecture overview</title>
  <desc id="desc">Layered diagram showing BIOS boot, NeXus Core, kernel modules, servers, runtime and SDK.</desc>
  <defs>
    <style>
      .bg { fill: #0f172a; }
      .panel { fill: #111827; stroke: #334155; stroke-width: 2; rx: 10; }
      .core { fill: #12343b; stroke: #2dd4bf; stroke-width: 2; rx: 10; }
      .mod { fill: #1f2937; stroke: #64748b; stroke-width: 1.5; rx: 8; }
      .future { fill: #2a2139; stroke: #a78bfa; stroke-width: 1.5; rx: 8; }
      .text { font: 16px monospace; fill: #e5e7eb; }
      .small { font: 13px monospace; fill: #cbd5e1; }
      .title { font: 28px monospace; font-weight: 700; fill: #f8fafc; }
      .label { font: 18px monospace; font-weight: 700; fill: #f8fafc; }
      .arrow { stroke: #94a3b8; stroke-width: 2; fill: none; marker-end: url(#arrow); }
    </style>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#94a3b8"/>
    </marker>
  </defs>
  <rect class="bg" width="1120" height="680"/>
  <text x="40" y="52" class="title">NeXus architecture - v0.2.0-m2</text>
  <text x="40" y="82" class="small">Microkernel path: boot, long mode, core modules, services and future runtime.</text>

  <rect x="40" y="120" width="220" height="100" class="panel"/>
  <text x="68" y="156" class="label">Boot layer</text>
  <text x="68" y="184" class="small">boot/boot.asm</text>
  <text x="68" y="204" class="small">BIOS sector + disk load</text>

  <rect x="330" y="105" width="460" height="130" class="core"/>
  <text x="375" y="145" class="label">NeXus Core</text>
  <text x="375" y="174" class="small">kernel/longmode/kernel_lm.asm</text>
  <text x="375" y="194" class="small">16-bit -> 32-bit -> 64-bit bootstrap</text>
  <text x="375" y="214" class="small">PML4, IDT, serial, halt-safe diagnostics</text>

  <rect x="860" y="120" width="220" height="100" class="panel"/>
  <text x="890" y="156" class="label">Build outputs</text>
  <text x="890" y="184" class="small">build/os.img</text>
  <text x="890" y="204" class="small">build/os_pm.img / os_lm.img</text>

  <path d="M260 170 H330" class="arrow"/>
  <path d="M790 170 H860" class="arrow"/>

  <rect x="70" y="300" width="220" height="100" class="mod"/>
  <text x="102" y="336" class="label">Paging</text>
  <text x="102" y="365" class="small">kernel/paging/</text>
  <text x="102" y="386" class="small">PML4 + bump allocator</text>

  <rect x="330" y="300" width="220" height="100" class="mod"/>
  <text x="365" y="336" class="label">Interrupt</text>
  <text x="365" y="365" class="small">kernel/interrupt/</text>
  <text x="365" y="386" class="small">IDT + CPU exceptions</text>

  <rect x="590" y="300" width="220" height="100" class="mod"/>
  <text x="625" y="336" class="label">Drivers</text>
  <text x="625" y="365" class="small">kernel/drivers/</text>
  <text x="625" y="386" class="small">COM1 serial now</text>

  <rect x="850" y="300" width="220" height="100" class="mod"/>
  <text x="885" y="336" class="label">Legacy M0/M1</text>
  <text x="885" y="365" class="small">kernel.asm</text>
  <text x="885" y="386" class="small">kernel_pm.asm</text>

  <path d="M500 235 L200 300" class="arrow"/>
  <path d="M550 235 L440 300" class="arrow"/>
  <path d="M610 235 L700 300" class="arrow"/>
  <path d="M670 235 L960 300" class="arrow"/>

  <rect x="90" y="500" width="280" height="100" class="future"/>
  <text x="125" y="536" class="label">NeXus Services</text>
  <text x="125" y="565" class="small">fs_server, driver_server</text>
  <text x="125" y="586" class="small">Future isolated tasks</text>

  <rect x="420" y="500" width="280" height="100" class="future"/>
  <text x="455" y="536" class="label">NeXus Runtime</text>
  <text x="455" y="565" class="small">syscalls, IPC ABI, ELF</text>
  <text x="455" y="586" class="small">Future C/Rust path</text>

  <rect x="750" y="500" width="280" height="100" class="future"/>
  <text x="785" y="536" class="label">NeXus SDK</text>
  <text x="785" y="565" class="small">build, debug, examples</text>
  <text x="785" y="586" class="small">Validation tooling</text>

  <path d="M440 400 L230 500" class="arrow"/>
  <path d="M560 400 V500" class="arrow"/>
  <path d="M700 400 L890 500" class="arrow"/>
</svg>
