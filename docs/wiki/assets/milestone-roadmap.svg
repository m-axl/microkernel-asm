<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="420" viewBox="0 0 1120 420" role="img" aria-labelledby="title desc">
  <title id="title">NeXus milestone roadmap</title>
  <desc id="desc">Roadmap from M0 boot to M6 C and Rust runtime.</desc>
  <defs>
    <style>
      .bg { fill: #0f172a; }
      .done { fill: #12343b; stroke: #2dd4bf; stroke-width: 2; rx: 10; }
      .current { fill: #172033; stroke: #60a5fa; stroke-width: 2; rx: 10; }
      .future { fill: #2a2139; stroke: #a78bfa; stroke-width: 2; rx: 10; }
      .text { font: 15px monospace; fill: #f8fafc; font-weight: 700; }
      .small { font: 12px monospace; fill: #cbd5e1; }
      .title { font: 28px monospace; font-weight: 700; fill: #f8fafc; }
      .line { stroke: #64748b; stroke-width: 3; }
    </style>
  </defs>
  <rect class="bg" width="1120" height="420"/>
  <text x="40" y="54" class="title">Milestone roadmap</text>
  <line x1="100" y1="210" x2="1020" y2="210" class="line"/>

  <rect x="45" y="145" width="130" height="130" class="done"/>
  <text x="82" y="182" class="text">M0</text>
  <text x="72" y="210" class="small">Real mode</text>
  <text x="72" y="230" class="small">Bootable</text>

  <rect x="205" y="145" width="130" height="130" class="done"/>
  <text x="242" y="182" class="text">M1</text>
  <text x="226" y="210" class="small">Protected</text>
  <text x="232" y="230" class="small">GDT + A20</text>

  <rect x="365" y="145" width="130" height="130" class="current"/>
  <text x="402" y="182" class="text">M2</text>
  <text x="392" y="210" class="small">Long mode</text>
  <text x="392" y="230" class="small">PML4 + IDT</text>

  <rect x="525" y="145" width="130" height="130" class="future"/>
  <text x="562" y="182" class="text">M3</text>
  <text x="552" y="210" class="small">Interrupts</text>
  <text x="558" y="230" class="small">Timer</text>

  <rect x="685" y="145" width="130" height="130" class="future"/>
  <text x="722" y="182" class="text">M4</text>
  <text x="718" y="210" class="small">Ring3</text>
  <text x="716" y="230" class="small">Syscalls</text>

  <rect x="845" y="145" width="130" height="130" class="future"/>
  <text x="882" y="182" class="text">M5</text>
  <text x="878" y="210" class="small">ELF</text>
  <text x="868" y="230" class="small">Userspace</text>

  <rect x="985" y="145" width="100" height="130" class="future"/>
  <text x="1014" y="182" class="text">M6</text>
  <text x="1009" y="210" class="small">C/Rust</text>
  <text x="1012" y="230" class="small">Runtime</text>
</svg>
